services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vitalmas-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vitalmas
      SPRING_DATASOURCE_USERNAME: vitalmas
      SPRING_DATASOURCE_PASSWORD: vitalmas
      SPRING_PROFILES_ACTIVE: edu
      SECURITY_JWT_SECRET: cambia-esta-clave-por-una-segura-en-produccion
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vitalmas-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
